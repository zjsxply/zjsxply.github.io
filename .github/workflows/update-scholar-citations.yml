name: Update Scholar citations

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update Scholar citations from SerpApi
        env:
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
        run: |
          if [ -z "$SERPAPI_API_KEY" ]; then
            echo "::warning::SERPAPI_API_KEY is not set; skipping Scholar citation update."
            exit 0
          fi
          python3 bin/update_scholar_citations_serpapi.py

      - name: Commit updated citation counts
        run: |
          if git diff --quiet -- _data/publications.yml; then
            echo "No citation changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _data/publications.yml
          git commit -m "Update Scholar citations"
          git push

      - name: Trigger site deployment
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -d '{"ref":"main"}' \
            "https://api.github.com/repos/$REPO/actions/workflows/deploy.yml/dispatches"
