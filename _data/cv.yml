      - label: Population Evolution of Agents in Competitive Evaluation Ecosystems
        details: >
          Ongoing first-author project on population-level agent evolution, social learning, and adversarial adaptation in heterogeneous competitive environments.
      - label: Trusted Execution Environments for SWE
        details: >
          Ongoing first-author project on automatic construction of trustworthy execution environments for software-engineering agents beyond Python-centric setup pipelines.

