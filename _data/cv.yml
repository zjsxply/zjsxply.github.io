    Research Experience:
      - label: "[Natural-Language Agent Harnesses](https://arxiv.org/abs/2603.25723)"
        details: >
          First-author work introducing [NLAH](https://arxiv.org/abs/2603.25723) and IHR to decouple agent harness mechanisms such as search, persistent memory, compression, and verification into explicit natural-language-executable orchestration.
      - label: CATArena
